<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopNest Support — Rishika</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e8e6e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.header { background: #1a1d27; border-bottom: 1px solid #2a2d3a; padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.avatar { width: 38px; height: 38px; background: linear-gradient(135deg, #6c63ff, #a78bfa); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.hinfo { flex: 1; }
.hname { font-size: 14px; font-weight: 600; color: #f0ede8; }
.hsub { font-size: 11px; color: #6b7280; margin-top: 1px; }
.sdot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 4px; }
.lbadge { background: #1e2235; border: 1px solid #2a2d3a; border-radius: 5px; padding: 3px 8px; font-size: 11px; color: #9ca3af; }
.langbar { background: #13161f; border-bottom: 1px solid #1e2235; padding: 6px 16px; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
.ll { font-size: 11px; color: #4b5563; margin-right: 2px; }
.lb { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 20px; padding: 2px 9px; font-size: 11px; color: #9ca3af; cursor: pointer; transition: all 0.15s; }
.lb:hover, .lb.active { background: #6c63ff22; border-color: #6c63ff; color: #a78bfa; }
.msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-thumb { background: #2a2d3a; }
.msg { display: flex; gap: 8px; max-width: 82%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.agent { align-self: flex-start; }
.bubble { padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.55; word-break: break-word; white-space: pre-wrap; }
.user .bubble { background: #6c63ff; color: #fff; border-bottom-right-radius: 3px; white-space: normal; }
.agent .bubble { background: #1e2235; color: #e8e6e0; border-bottom-left-radius: 3px; border: 1px solid #2a2d3a; }
.mavatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; }
.agent .mavatar { background: linear-gradient(135deg, #6c63ff, #a78bfa); }
.user .mavatar { background: #374151; }
.meta { font-size: 10px; color: #4b5563; margin-top: 3px; padding: 0 3px; }
.user .meta { text-align: right; }
.hw { background: #1a1f2e; border: 1px solid #2d3a5a; border-left: 3px solid #f59e0b; border-radius: 7px; padding: 8px 12px; margin-top: 7px; font-size: 11px; color: #9ca3af; }
.hwt { font-size: 10px; font-weight: 600; color: #f59e0b; margin-bottom: 5px; }
.typing { display: flex; gap: 4px; align-items: center; padding: 10px 13px; }
.typing span { width: 5px; height: 5px; background: #6c63ff; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-5px);opacity:1} }
.qr { padding: 7px 16px; display: flex; gap: 6px; flex-wrap: wrap; border-top: 1px solid #1e2235; background: #0f1117; flex-shrink: 0; }
.ql { font-size: 10px; color: #4b5563; width: 100%; margin-bottom: 1px; }
.qb { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 20px; padding: 4px 10px; font-size: 11px; color: #9ca3af; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.qb:hover { background: #6c63ff22; border-color: #6c63ff; color: #a78bfa; }
.ia { background: #1a1d27; border-top: 1px solid #2a2d3a; padding: 10px 14px; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
textarea { flex: 1; background: #0f1117; border: 1px solid #2a2d3a; border-radius: 10px; padding: 8px 12px; color: #e8e6e0; font-size: 13px; font-family: inherit; resize: none; outline: none; min-height: 40px; max-height: 100px; line-height: 1.5; transition: border-color 0.15s; }
textarea::placeholder { color: #4b5563; }
textarea:focus { border-color: #6c63ff; }
.sb { width: 40px; height: 40px; background: #6c63ff; border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
.sb:hover { background: #5b54e8; }
.sb:disabled { background: #2a2d3a; cursor: not-allowed; }
.sb svg { width: 16px; height: 16px; fill: white; }
.welcome { text-align: center; padding: 24px 16px; color: #4b5563; font-size: 13px; }
.welcome-icon { font-size: 28px; margin-bottom: 7px; }
.welcome h3 { font-size: 14px; color: #9ca3af; margin-bottom: 3px; font-weight: 500; }
.ebadge { display: inline-block; background: #7f1d1d22; border: 1px solid #dc2626; color: #f87171; font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 3px; margin-left: 5px; }
.errbar { background: #7f1d1d22; border: 1px solid #dc2626; color: #f87171; font-size: 11px; padding: 6px 12px; text-align: center; display: none; flex-shrink: 0; }
</style>
</head>
<body>
<div class="header">
  <div class="avatar">🌸</div>
  <div class="hinfo">
    <div class="hname"><span class="sdot"></span>Rishika — ShopNest Support</div>
    <div class="hsub">Tier-1 AI Agent · Multilingual · Powered by Gemini</div>
  </div>
  <div class="lbadge" id="dlang">🌐 Auto</div>
</div>
<div style="background:#13161f;border-bottom:1px solid #1e2235;padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
  <a href="landing.html" style="background:#1e2235;border:1px solid #2a2d3a;border-radius:20px;padding:5px 12px;font-size:12px;color:#9ca3af;text-decoration:none;">Welcome</a>
  <a href="index.html" style="background:#6c63ff22;border:1px solid #6c63ff;border-radius:20px;padding:5px 12px;font-size:12px;color:#a78bfa;text-decoration:none;">Chat</a>
  <a href="console.html" style="background:#1e2235;border:1px solid #2a2d3a;border-radius:20px;padding:5px 12px;font-size:12px;color:#9ca3af;text-decoration:none;">Support Console</a>
  <a href="faq.html" style="background:#1e2235;border:1px solid #2a2d3a;border-radius:20px;padding:5px 12px;font-size:12px;color:#9ca3af;text-decoration:none;">FAQ &amp; Policies</a>
  <a href="benchmarks.html" style="background:#1e2235;border:1px solid #2a2d3a;border-radius:20px;padding:5px 12px;font-size:12px;color:#9ca3af;text-decoration:none;">Benchmarks</a>
  <a href="escalation.html" style="background:#1e2235;border:1px solid #2a2d3a;border-radius:20px;padding:5px 12px;font-size:12px;color:#9ca3af;text-decoration:none;">Escalation Rules</a>
</div>
<div class="langbar">
  <span class="ll">Language:</span>
  <button class="lb active" data-lang="English" onclick="setLang(this)">EN</button>
  <button class="lb" data-lang="Hindi" onclick="setLang(this)">HI</button>
  <button class="lb" data-lang="French" onclick="setLang(this)">FR</button>
  <button class="lb" data-lang="Spanish" onclick="setLang(this)">ES</button>
  <button class="lb" data-lang="Arabic" onclick="setLang(this)">AR</button>
  <button class="lb" data-lang="Mandarin Chinese" onclick="setLang(this)">ZH</button>
  <button class="lb" data-lang="Portuguese" onclick="setLang(this)">PT</button>
  <button class="lb" data-lang="German" onclick="setLang(this)">DE</button>
  <button class="lb" data-lang="Japanese" onclick="setLang(this)">JA</button>
  <button class="lb" data-lang="Russian" onclick="setLang(this)">RU</button>
</div>
<div class="errbar" id="errbar"></div>
<div class="msgs" id="msgs">
  <div class="welcome">
    <div class="welcome-icon">🛍️</div>
    <h3>Welcome to ShopNest Support</h3>
    <p>Rishika is here 24/7 in your language</p>
  </div>
</div>
<div class="qr" id="qr">
  <div class="ql">Try asking:</div>
  <button class="qb" onclick="sq('Where is my order?')">Where is my order?</button>
  <button class="qb" onclick="sq('How do I return a product?')">How to return?</button>
  <button class="qb" onclick="sq('My payment failed but money was deducted')">Payment issue</button>
  <button class="qb" onclick="sq('Someone hacked my account and placed an order I never made')">🚨 Account hacked</button>
  <button class="qb" onclick="sq('मुझे मेरा ऑर्डर वापस करना है')">हिंदी</button>
  <button class="qb" onclick="sq('Mon paiement a échoué mais largent a été déduit')">Français</button>
</div>
<div class="ia">
  <textarea id="inp" placeholder="Type in any language..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
    oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
  <button class="sb" id="sbtn" onclick="send()">
    <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<script>
// NOTE: No API key here. The browser only ever talks to our own backend
// at /api/chat, which holds the real Gemini key server-side.
const CHAT_ENDPOINT = '/api/chat';

let lang = 'English';
let history = [];
let busy = false;

function setLang(btn) {
  document.querySelectorAll('.lb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  lang = btn.dataset.lang;
  document.getElementById('dlang').textContent = '🌐 ' + btn.textContent;
}

function sq(t) { document.getElementById('inp').value = t; send(); }

function showError(msg) {
  const bar = document.getElementById('errbar');
  bar.textContent = msg;
  bar.style.display = 'block';
  setTimeout(() => { bar.style.display = 'none'; }, 5000);
}

function addMsg(role, text) {
  const el = document.getElementById('msgs');
  document.getElementById('qr').style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'mavatar';
  av.textContent = role === 'agent' ? '🌸' : '👤';
  const cd = document.createElement('div');
  cd.style.flex = '1';
  let main = text, hw = null;
  if (role === 'agent' && text.includes('🔧 HANDOVER SUMMARY')) {
    const p = text.split('🔧 HANDOVER SUMMARY');
    main = p[0].trim();
    hw = p[1] ? p[1].replace('(Internal)', '').trim() : null;
  }
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = main;
  cd.appendChild(b);
  if (hw) {
    const hd = document.createElement('div');
    hd.className = 'hw';
    hd.innerHTML = '<div class="hwt">🔧 HANDOVER SUMMARY (Internal)</div>';
    const pre = document.createElement('pre');
    pre.style.cssText = 'white-space:pre-wrap;font-family:inherit;font-size:11px;line-height:1.6';
    pre.textContent = hw;
    hd.appendChild(pre);
    cd.appendChild(hd);
  }
  const mt = document.createElement('div');
  mt.className = 'meta';
  mt.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if (hw) { const eb = document.createElement('span'); eb.className = 'ebadge'; eb.textContent = 'ESCALATED'; mt.appendChild(eb); }
  cd.appendChild(mt);
  wrap.appendChild(av);
  wrap.appendChild(cd);
  el.appendChild(wrap);
  el.scrollTop = el.scrollHeight;
}

function showTyping() {
  const el = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg agent'; d.id = 'typ';
  const av = document.createElement('div'); av.className = 'mavatar'; av.textContent = '🌸';
  const b = document.createElement('div'); b.className = 'bubble';
  b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  d.appendChild(av); d.appendChild(b); el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = ''; inp.style.height = 'auto';
  busy = true; document.getElementById('sbtn').disabled = true;
  addMsg('user', txt);
  const fmsg = 'Detected language: ' + lang + '. Customer message: ' + txt;
  history.push({ role: 'user', parts: [{ text: fmsg }] });
  showTyping();
  try {
    const res = await fetch(CHAT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ history, language: lang, message: txt })
    });
    const data = await res.json();
    document.getElementById('typ')?.remove();
    if (!res.ok) {
      showError(data.error || 'Server error. Please try again.');
      addMsg('agent', 'Sorry, something went wrong on our end. Please try again. 🙏');
    } else {
      history.push({ role: 'model', parts: [{ text: data.reply }] });
      addMsg('agent', data.reply);
    }
  } catch (e) {
    document.getElementById('typ')?.remove();
    showError('Could not reach the server. Is it running?');
    addMsg('agent', 'Connection issue. Please try again. 🙏');
  }
  busy = false; document.getElementById('sbtn').disabled = false;
  inp.focus();
}
</script>
</body>
</html>
