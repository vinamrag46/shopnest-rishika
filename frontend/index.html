<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopNest Support — Sign In</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e8e6e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
.brand { text-align: center; font-size: 15px; font-weight: 700; color: #f0ede8; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.subtitle { text-align: center; font-size: 12px; color: #9ca3af; margin-bottom: 28px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
.field input { width: 100%; background: #12141c; border: 1px solid #2a2d3a; border-radius: 8px; padding: 11px 12px; font-size: 14px; color: #e8e6e0; outline: none; transition: border-color 0.15s; }
.field input:focus { border-color: #6c63ff; }
.error-msg { background: #3a1a1f; border: 1px solid #7a2a33; color: #ff9aa8; font-size: 12px; padding: 9px 12px; border-radius: 8px; margin-bottom: 16px; display: none; }
.error-msg.show { display: block; }
.signin-btn { width: 100%; background: linear-gradient(135deg, #6c63ff, #a78bfa); color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: transform 0.15s; }
.signin-btn:hover { transform: translateY(-1px); }
.signin-btn:active { transform: translateY(0); }
.hint { text-align: center; font-size: 11px; color: #4b5563; margin-top: 20px; }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">🌸 ShopNest Support</div>
  <div class="subtitle">Sign in to continue</div>

  <div class="error-msg" id="errorMsg">Incorrect email or password. Please try again.</div>

  <form id="loginForm">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@shopnest.com" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="signin-btn">Sign In</button>
  </form>

  <div class="hint">Internal capstone project — authorized access only</div>
</div>

<script>
const VALID_EMAIL = "admin@shopnest.com";
const VALID_PASSWORD = "shopnest2026";

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');

  if (email === VALID_EMAIL && password === VALID_PASSWORD) {
    sessionStorage.setItem('shopnest_authed', 'true');
    window.location.href = 'landing.html';
  } else {
    errorMsg.classList.add('show');
  }
});
</script>

</body>
</html>
